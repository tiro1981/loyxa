<!DOCTYPE html>
<html lang="uz" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0e14" />
  <title>Ovqat Dokoni — Yetkazib berish</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛒</text></svg>" />
  <link rel="stylesheet" href="css/theme.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app" id="app">
    <div id="view"></div>
    <nav class="tabbar" id="tabbar"></nav>

    <!-- overlays scoped to the phone frame -->
    <div class="sheet-layer" id="sheetLayer"></div>
    <div class="toast-layer" id="toastLayer"></div>
  </div>

  <!-- Supabase + Cloud qatlami (boshqa skriptlardan OLDIN) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="cloud.js?v=3"></script>

  <!-- Boot-loader: AVVAL Cloud.init (server ma'lumotini yuklaydi), keyin ilova skriptlari.
       order matters: data -> store -> telegram -> app -> components -> views -->
  <script>
    window.__CLOUD_BOOT = true;  // app.js avtomatik boot qilmasin — loader o'zi chaqiradi
    (async () => {
      const CLIENT_ID = new URLSearchParams(location.search).get("client")
        || (function () { try { return JSON.parse(localStorage.getItem("bo_session") || "{}").clientId; } catch (e) { return null; } })()
        || "demo";
      window.__CLIENT_ID = CLIENT_ID;
      try { await Cloud.init("ovqat", CLIENT_ID); } catch (e) { console.error("[boot] Cloud.init:", e); }
      const scripts = [
        "uzbekistan-regions.js",
        "js/data.js", "js/store.js", "telegram.js", "js/app.js", "js/components.js",
        "js/views/home.js", "js/views/category.js", "js/views/product.js", "js/views/cart.js",
        "js/views/checkout.js", "js/views/orders.js", "js/views/profile.js", "js/views/subpages.js"
      ];
      for (const src of scripts) {
        await new Promise((res, rej) => { const s = document.createElement("script"); s.src = src + "?v=6"; s.onload = res; s.onerror = rej; document.body.appendChild(s); });
      }
      if (window.UI && UI.go) UI.go("home");   // barcha skript yuklangach boshlang'ich render
    })();
  </script>
</body>
</html>
