  </defs>
  <rect width="512" height="512" rx="104" fill="url(#bg)"/>
  <!-- straw -->
  <line x1="298" y1="118" x2="262" y2="212" stroke="#fde68a" stroke-width="20" stroke-linecap="round"/>
  <!-- lid -->
