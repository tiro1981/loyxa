<!doctype html>
<html lang="uz" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="color-scheme" content="dark light" />
  <meta name="theme-color" content="#070c15" />
  <title data-i18n="app.title">Salqin — Sovuq ichimliklar do'koni</title>
  <link rel="icon" type="image/svg+xml" href="icon.svg" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=2" />
</head>
<body class="app">
  <!-- TOP BAR -->
  <header class="topbar">
    <div class="container topbar-inner">
      <span class="logo">
        <span class="logo-mark">❄</span>
        <span>Salqin</span>
      </span>
      <h1 class="page-title" id="pageTitle" data-i18n="bn.home">Asosiy</h1>
    </div>
  </header>

  <!-- ============ ASOSIY (HOME / catalog) ============ -->
  <main id="pageHome" class="page page-active">
    <div class="container">
      <div class="search search-full">
        <input id="searchInput" type="search" data-i18n-ph="catalog.search" placeholder="Ichimlik qidirish..." />
      </div>
      <div id="categories" class="categories"></div>
      <div id="productsGrid" class="products"></div>
      <div id="emptyState" class="empty hidden" data-i18n="common.empty">Hech narsa topilmadi</div>
    </div>
  </main>

  <!-- ============ SAVAT ============ -->
  <main id="pageCart" class="page">
    <div class="container">
      <div id="cartItems" class="cart-list"></div>
    </div>
    <div class="page-foot" id="cartFoot">
      <div class="row"><span data-i18n="cart.total">Jami:</span><b id="cartTotal">0 so'm</b></div>
      <button id="checkoutBtn" class="btn btn-primary btn-block" data-i18n="btn.checkout">Buyurtma berish</button>
    </div>
  </main>

  <!-- ============ BUYURTMALAR ============ -->
  <main id="pageOrders" class="page">
    <div class="container">
      <div id="ordersList" class="orders-list"></div>
    </div>
  </main>

  <!-- ============ PROFIL ============ -->
  <main id="pageProfile" class="page">
    <div class="container">
      <div id="profileBody" class="profile-body"></div>
    </div>
  </main>

  <!-- CHECKOUT MODAL -->
  <div id="checkoutModal" class="modal">
    <div class="modal-card">
      <button class="icon-btn modal-close" data-close="checkout">✕</button>
      <h3 data-i18n="checkout.title">Buyurtmani rasmiylashtirish</h3>
      <form id="checkoutForm" class="form">
        <label><span data-i18n="checkout.name">Ism familiya</span><input name="name" required /></label>
        <label><span data-i18n="checkout.phone">Telefon</span><input name="phone" required placeholder="+998 90 000 00 00" /></label>
        <label><span data-i18n="checkout.address">Manzil</span><input name="address" required data-i18n-ph="checkout.address.ph" placeholder="Ko'cha, uy" /></label>
        <label><span data-i18n="checkout.note">Izoh</span><textarea name="note" rows="2"></textarea></label>

        <div class="payment-section">
          <span class="form-label" data-i18n="checkout.payment">To'lov turi</span>
          <div class="payment-options">
            <label class="pay-opt">
              <input type="radio" name="payment" value="naqd" checked />
              <div class="pay-card">
                <div class="pay-icon">💵</div>
                <div><b data-i18n="pay.cash">Naqd</b><small data-i18n="pay.cash.sub">Kuryerga to'lov</small></div>
              </div>
            </label>
            <label class="pay-opt pay-soon" title="Tez orada qo'shiladi">
              <input type="radio" name="payment" value="karta" disabled />
              <div class="pay-card">
                <div class="pay-icon">💳</div>
                <div><b data-i18n="pay.card">Karta</b><small>Tez orada qo'shiladi</small></div>
              </div>
            </label>
            <label class="pay-opt pay-soon" title="Tez orada qo'shiladi">
              <input type="radio" name="payment" value="click" disabled />
              <div class="pay-card">
                <div class="pay-icon">📲</div>
                <div><b data-i18n="pay.click">Click / Payme</b><small>Tez orada qo'shiladi</small></div>
              </div>
            </label>
          </div>
        </div>

        <!-- Karta raqami/CVV/SMS maydonlari olib tashlandi:
             haqiqiy to'lov integratsiyasisiz karta ma'lumotlarini yig'ish xavfli.
             To'lov yetkazib berishda tanlangan usul orqali amalga oshiriladi. -->
        <div class="summary" id="checkoutSummary"></div>
        <button class="btn btn-primary btn-block" type="submit" data-i18n="btn.confirm">Tasdiqlash</button>
      </form>
    </div>
  </div>

  <!-- AUTH MODAL -->
  <div id="authModal" class="modal">
    <div class="modal-card">
      <button class="icon-btn modal-close" data-close="auth">✕</button>
      <div class="tabs">
        <button class="tab active" data-tab="login" data-i18n="btn.login">Kirish</button>
        <button class="tab" data-tab="register" data-i18n="btn.register">Ro'yxatdan o'tish</button>
      </div>
      <form id="loginForm" class="form tab-pane active">
        <label><span data-i18n="checkout.phone">Telefon</span><input name="phone" required /></label>
        <label><span data-i18n="auth.password">Parol</span><input name="password" type="password" required /></label>
        <button class="btn btn-primary btn-block" type="submit" data-i18n="btn.login">Kirish</button>
      </form>
      <form id="registerForm" class="form tab-pane">
        <label><span data-i18n="checkout.name">Ism familiya</span><input name="name" required /></label>
        <label><span data-i18n="checkout.phone">Telefon</span><input name="phone" required /></label>
        <label><span data-i18n="auth.address.optional">Manzil</span><input name="address" /></label>
        <label><span data-i18n="auth.password">Parol</span><input name="password" type="password" required /></label>
        <button class="btn btn-primary btn-block" type="submit" data-i18n="btn.register">Ro'yxatdan o'tish</button>
      </form>
    </div>
  </div>

  <!-- ADDRESS MODAL -->
  <div id="addressModal" class="modal">
    <div class="modal-card">
      <button class="icon-btn modal-close" data-close="address">✕</button>
      <h3>Yetkazib berish manzili</h3>
      <form id="addressForm" class="form">
        <label><span>Viloyat / Shahar</span>
          <select id="addrRegion" name="region" required>
            <option value="">Tanlang...</option>
          </select>
        </label>
        <label><span>Tuman / Shahar</span>
          <select id="addrDistrict" name="district" required disabled>
            <option value="">Avval viloyatni tanlang</option>
          </select>
        </label>
        <label><span>Mahalla / Ko'cha</span>
          <input id="addrStreet" name="street" placeholder="Masalan: Buyuk Turon, 45-uy" required />
        </label>
        <label><span>Uy / Kvartira raqami</span>
          <input id="addrHouse" name="house" placeholder="Masalan: 12-xonadon" />
        </label>
        <div id="addrPreview" class="addr-preview hidden"></div>
        <button class="btn btn-primary btn-block" type="submit">Saqlash</button>
      </form>
    </div>
  </div>

  <!-- PAYMENT MODAL -->
  <div id="paymentModal" class="modal">
    <div class="modal-card">
      <button class="icon-btn modal-close" data-close="payment">✕</button>
      <h3>To'lov usullari</h3>
      <div id="paymentMethods" class="pay-methods"></div>
    </div>
  </div>

  <!-- CHAT MODAL -->
  <div id="chatModal" class="modal">
    <div class="modal-card modal-card-chat">
      <button class="icon-btn modal-close" data-close="chat">✕</button>
      <h3>Admin bilan chat</h3>
      <div id="chatMessages" class="chat-messages"></div>
      <form id="chatForm" class="chat-form">
        <input id="chatInput" type="text" placeholder="Xabar yozing..." autocomplete="off" />
        <button type="submit" class="btn btn-primary chat-send">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M22 2L11 13"/><path d="M22 2l-7 20-4-9-9-4 20-7z"/></svg>
        </button>
      </form>
    </div>
  </div>

  <!-- LANG MENU (Profil sahifasidan chaqiriladi) -->
  <div id="langMenu" class="lang-menu hidden">
    <button data-lang="uz"><span>🇺🇿</span> O'zbekcha</button>
    <button data-lang="ru"><span>🇷🇺</span> Русский</button>
    <button data-lang="en"><span>🇬🇧</span> English</button>
  </div>

  <!-- BOTTOM NAVIGATION -->
  <nav class="bottom-nav" id="bottomNav" aria-label="App navigation">
    <button class="bn-item active" data-bn="home" aria-label="Asosiy">
      <span class="bn-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 11l9-8 9 8v10a2 2 0 0 1-2 2h-4v-7H9v7H5a2 2 0 0 1-2-2V11z"/>
        </svg>
      </span>
      <span class="bn-label" data-i18n="bn.home">Asosiy</span>
    </button>
    <button class="bn-item" data-bn="cart" aria-label="Savat">
      <span class="bn-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="9" cy="21" r="1.6"/>
          <circle cx="18" cy="21" r="1.6"/>
          <path d="M3 3h2l2.4 12.3a2 2 0 0 0 2 1.7h8.2a2 2 0 0 0 2-1.5L22 7H6"/>
        </svg>
        <span class="bn-badge hidden" id="bnCartBadge">0</span>
      </span>
      <span class="bn-label" data-i18n="bn.cart">Savat</span>
    </button>
    <button class="bn-item" data-bn="orders" aria-label="Buyurtmalar">
      <span class="bn-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 16V8a2 2 0 0 0-1-1.7l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.7l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
          <path d="M3.3 7l8.7 5 8.7-5"/>
          <path d="M12 22V12"/>
        </svg>
        <span class="bn-badge bn-badge-danger hidden" id="bnOrdersBadge">0</span>
      </span>
      <span class="bn-label" data-i18n="bn.orders">Buyurtmalar</span>
    </button>
    <button class="bn-item" data-bn="profile" aria-label="Profil">
      <span class="bn-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
      </span>
      <span class="bn-label" data-i18n="bn.profile">Profil</span>
    </button>
  </nav>

  <!-- TOAST -->
  <div id="toast" class="toast"></div>

  <script src="db.js?v=3"></script>
  <script src="i18n.js?v=3"></script>
  <script src="telegram.js?v=4"></script>
  <script src="script.js?v=3"></script>
</body>
</html>
